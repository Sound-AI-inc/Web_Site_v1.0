name = "website"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"
workers_dev = true

# API routes run in the Worker BEFORE static assets — fixes POST 405 on /early-access.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/early-access*", "/api/early-access*"]

# Secrets (do not put in this file):
#   npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   npx wrangler secret put GOOGLE_SHEETS_WEBAPP_URL
[vars]
SUPABASE_URL = "https://xnjugeewwjclgsaynthi.supabase.co"
ALLOWED_ORIGINS = "https://web-site-v1-0.vercel.app,https://website.soundai-inc.workers.dev,http://localhost:5173,http://127.0.0.1:5173"

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
